<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Dehazer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- SIGNUP -->
    <div id="signup_box">
      <h2>Signup</h2>
      <form action="http://localhost:5000/signup" method="POST">
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button type="submit">Signup</button>
      </form>
      <p>Already have an account? <a href="#login" onclick="showLogin()">Login</a></p>
    </div>

    <!-- LOGIN -->
    <div id="login_box" style="display:none;">
      <h2>Login</h2>
      <form action="http://localhost:5000/login" method="POST">
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button type="submit">Login</button>
      </form>
      <p>Don't have an account? <a href="#signup" onclick="showSignup()">Signup</a></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
