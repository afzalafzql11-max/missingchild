<!DOCTYPE html>
<html>

<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
<title>Image Dehazer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Image Dehazer</h1>

<div id="auth">

<!-- SIGNUP -->
<div id="signup_box">

<h2>Signup</h2>

<input id="signup_email" placeholder="Email">
<input id="signup_pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<p>
Already have account? 
<a href="#" onclick="showLogin()">Login</a>
</p>

</div>


<!-- LOGIN -->
<div id="login_box" style="display:none">

<h2>Login</h2>

<input id="login_email" placeholder="Email">
<input id="login_pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>
Don't have account?
<a href="#" onclick="showSignup()">Signup</a>
</p>

</div>

</div>


<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<h2>Upload Hazy Image</h2>

<input type="file" id="image">

<button onclick="upload()">Dehaze</button>

<br><br>

<button onclick="loadHistory()">View History</button>

<div id="history"></div>

</div>

<script src="script.js"></script>

</body>
</html>
