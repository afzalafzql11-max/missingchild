<!DOCTYPE html>
<html>

<head>

<title>Image_DeHazer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Image Dehazer</h1>

<div id="auth">

<h2>Signup</h2>

<input id="signup_email" placeholder="Email">
<input id="signup_pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<hr>

<h2>Login</h2>

<input id="login_email" placeholder="Email">
<input id="login_pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div id="dashboard" style="display:none">

<h2>Upload Hazy Image</h2>

<input type="file" id="image">

<button onclick="upload()">Dehaze</button>

<br><br>

<button onclick="loadHistory()">View History</button>

<div id="history"></div>

</div>

<script src="script.js"></script>

</body>

</html>
